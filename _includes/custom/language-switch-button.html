{% assign current_lang = page.lang | default: 'en' %}
<nav class="language-switch" aria-label="Language switcher">
    <button
        type="button"
        class="language-switch-btn{% if current_lang == 'en' %} is-active{% endif %}"
        aria-pressed="{% if current_lang == 'en' %}true{% else %}false{% endif %}"
        onclick="changeLanguage('en')">
        English
    </button>
    <button
        type="button"
        class="language-switch-btn{% if current_lang == 'zh' %} is-active{% endif %}"
        aria-pressed="{% if current_lang == 'zh' %}true{% else %}false{% endif %}"
        onclick="changeLanguage('zh')">
        繁體中文
    </button>
</nav>
