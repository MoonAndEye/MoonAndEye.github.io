# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
github: [metadata]

title: Marv[in]sight
locale: "en-US"
email: atimis19@gmail.com
tagline: "Swift、AI agent 工作流程與投資筆記" # SEO：首頁 title 會是「站名 | tagline」
description: >- # this means to ignore newlines until "baseurl:"
  Marvin Lin 的中英雙語部落格：Swift 與 iOS 開發、AI coding agents 工作流程、單元測試與投資筆記，從台北出發的開發者觀點。
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.marvinswift.com" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  MoonAndEye

# SEO：Twitter card（jekyll-seo-tag 讀 twitter.username 產生 twitter:site）
twitter:
  username: atimisMoon

# SEO：首頁 Person 結構化資料（jekyll-seo-tag 產生 sameAs）
social:
  type: Person
  name: Marvin Lin
  links:
    - "https://x.com/atimisMoon"
    - "https://github.com/MoonAndEye"
    - "https://www.youtube.com/@MarvinBuildsAI"

search: true
author_profile: true

languages: ["zh", "en"]

# GA4 由 _layouts/default.html 內建的 gtag 片段處理；
# theme 的 analytics provider 關閉，避免注入吃不下 GA4 ID 的舊版 analytics.js
analytics:
  provider               : false

header_pages:
  - about.md
  - categories.md

# Build settings
# theme: minima
remote_theme: "mmistakes/minimal-mistakes@4.18.1"

image_extensions: ['jpg', 'jpeg', 'png']

plugins:
  - jekyll-feed
  - jemoji
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-gist
  - jekyll-include-cache

# 舊的 /zh/ 重複入口只保留轉址，不另外產生 redirects.json。
redirect_from:
  json: false

paginate: 15
paginate_path: "/page:num/"

# Site Author
author:
  name             : "Marvin Lin" # 側邊作者名稱
  avatar           : "/assets/author/avatar.jpg" # path of avatar image, e.g. "/assets/images/bio-photo.jpg"
  bio              : "Swift developer. AI-agent workflow builder." # 側邊作者簡介
  location         : "Taipei, Taiwan"
  twitter          : "atimisMoon" # SEO：jekyll-seo-tag 的 twitter:creator；也會在側邊欄顯示 X 連結
  links:
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/@MarvinBuildsAI"
      target: "_blank"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      # url: mailto:your.name@email.com
    # - label: "HomePage"
    #   icon: "fas fa-fw fa-link"
    #   url: "https://moonandeye.github.io/"
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook-square"
      # url: "https://facebook.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url:  "https://github.com/Moonandeye"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      # url: "https://instagram.com/"

# Disqus 評論
disqus:
  shortname: moonandeye

favicon: /assets/author/avatar.jpg

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - README.md
  - draft-skills/
  - notes/
  - env/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
# Defaults
defaults:
  # SEO：全站預設分享圖（jekyll-seo-tag 讀 page.image 產生 og:image）
  - scope:
      path: ""
    values:
      image: /assets/author/avatar.jpg
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author: "Marvin Lin"
      read_time: false
      share: true
      related: true
      author_profile: true
      toc: true
      toc_label: "概覽" # default: Content
      toc_icon: "book"  # corresponding Font Awesome icon name without the "fa" prefix
      toc_sticky: true   # enables sticky toc
      comments: true
  # 注意：path 不能以斜線開頭，否則永遠匹配不到（SEO audit 發現的 bug）
  - scope:
      path: "en"
    values:
      toc_label: "On this page"
      locale: en-US
      lang: en
  - scope:
      path: "zh"
    values:
      locale: zh-TW
      lang: zh
  - scope:
      path: "_posts/**/zh"
      type: posts
    values:
      locale: zh-TW
      lang: zh
      permalink: /zh/:categories/:title/
  - scope:
      path: "_posts/**/en"
      type: posts
    values:
      toc_label: "On this page"
      locale: en-US
      lang: en
      permalink: /en/:categories/:title/
